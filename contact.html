<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Dubby Code</title>
</head>
<body>
    <h1>Contacte-moi</h1>

    <form id="contactForm">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea name="message" id="message" required></textarea>

        <button type="submit" id="btnEnvoyer">Envoyer</button>
    </form>

    <p id="msgSucces" style="display: none; color: green;">Message envoyé !</p>
    <p id="msgErreur" style="display: none; color: red;">Une erreur est survenue.</p>

    <script src="contact.js"></script>
</body>
</html>
